services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: proxview:latest
    container_name: proxview
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATA_DIR: /data
      DEMO: "${DEMO:-0}"
      PROXVIEW_SECRET_KEY: "${PROXVIEW_SECRET_KEY:-}"
      # Optional: auto-provision the admin on first boot (skips the setup token).
      PROXVIEW_ADMIN_USER: "${PROXVIEW_ADMIN_USER:-}"
      PROXVIEW_ADMIN_PASSWORD: "${PROXVIEW_ADMIN_PASSWORD:-}"
    volumes:
      - ./data:/data
    # Published on localhost only by default. On a VPS/remote host, reach it over a
    # private tunnel by setting BIND_ADDR to the WireGuard/Tailscale interface IP
    # (e.g. BIND_ADDR=10.0.0.7) — never 0.0.0.0 on a public box.
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${PORT:-8080}:8080"

  # --- Optional plugin: Cloudflare Tunnel (activate with --profile cloudflare) ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: proxview-cloudflared
    command: tunnel --no-autoupdate run
    # Compose interpolates every service (even inactive profiles) at load time, so this
    # must not use ${VAR:?} — that would break a plain `docker compose up`. Set
    # CF_TUNNEL_TOKEN in .env before activating the cloudflare profile.
    environment:
      TUNNEL_TOKEN: "${CF_TUNNEL_TOKEN:-}"
    restart: unless-stopped
    depends_on:
      - app
    profiles:
      - cloudflare
